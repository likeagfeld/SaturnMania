# Video-enabled override for user observation (base retroarch.cfg is headless/null).
# Boots the game the same as the screenshot path; adds the two REAL fixes found by reading
# the RA verbose log: (1) audio_driver=wasapi -- the base sets it to null, which "Failed to
# initialize audio driver" -> no sound AND no audio clock; wasapi initializes (verified
# "[WASAPI] Client initialized 48000Hz"). (2) audio_sync=true -- with a WORKING audio driver
# this paces the core to the audio DAC = real-time (the Mednafen model), overriding vsync's
# pacing to a high-refresh monitor (which was the "way too fast"). vsync stays true for a
# clean image; audio_sync governs speed.
video_driver = "gl"
video_fullscreen = "false"
video_windowed_fullscreen = "false"
video_scale = "3.000000"
audio_enable = "true"
audio_mute_enable = "false"
audio_driver = "wasapi"
audio_sync = "true"
menu_driver = "rgui"
pause_nonactive = "false"
video_vsync = "true"
screenshot_directory = "D:\sonicmaniasaturn\_shots"
auto_screenshot_filename = "true"
notification_show_screenshot = "false"
# raw core-framebuffer screenshots (NOT GPU/window readback): with GPU screenshots a
# minimized/occluded GL window produced solid-black PNGs (2026-07-09) while the core ran
# fine (cont_frames advancing, structural state healthy). Raw captures the core video
# buffer regardless of window state.
video_gpu_screenshot = "false"
