# Video-enabled override for user observation (base retroarch.cfg is headless/null).
# Boots the game the same as the screenshot path; adds the REAL fixes found by reading
# the RA verbose log: (1) audio_driver=wasapi -- the base sets it to null, which "Failed to
# initialize audio driver" -> no sound AND no audio clock; wasapi initializes (verified
# "[WASAPI] Client initialized 48000Hz").
# SPEED CAP (2026-07-12, MEASURED FPS overlay = 150 with vsync=true): on a >60Hz monitor,
# video_vsync=true paces the core to the MONITOR refresh (150Hz here) = 2.5x too fast --
# vsync caps AT refresh, it cannot pace BELOW it, so audio_sync never gets to slow it down.
# DETERMINISTIC FIX: vsync=false so the frame limiter is governed by audio_sync (pace to the
# 48kHz DAC = the Mednafen real-time model = true ~59.82fps regardless of monitor) +
# fastforward_ratio=1.0 (0.0 = unlimited). This is the canonical "runs at correct speed on
# any monitor" RetroArch config. Was: vsync=true (ran at 150fps).
video_driver = "gl"
video_fullscreen = "false"
video_windowed_fullscreen = "false"
video_scale = "3.000000"
audio_enable = "true"
audio_mute_enable = "false"
audio_driver = "wasapi"
audio_sync = "true"
fastforward_ratio = "1.000000"
menu_driver = "rgui"
pause_nonactive = "false"
video_vsync = "false"
video_frame_delay = "0"
fps_show = "true"
screenshot_directory = "D:\sonicmaniasaturn\_shots"
auto_screenshot_filename = "true"
notification_show_screenshot = "false"
# raw core-framebuffer screenshots (NOT GPU/window readback): with GPU screenshots a
# minimized/occluded GL window produced solid-black PNGs (2026-07-09) while the core ran
# fine (cont_frames advancing, structural state healthy). Raw captures the core video
# buffer regardless of window state.
video_gpu_screenshot = "false"
